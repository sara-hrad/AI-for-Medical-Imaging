defaults:
  - hydra: default
  - model: dyn_unet_base
  - _self_

# i/o
image_path: './input_vesselFM' #TODO
image_file_ending: nii.gz
output_folder: './output_vesselFM' # TODO
file_app: ""

mask_path: null
round_to: 2

# model & ckpt
device: cuda:0
ckpt_path: /path/to/ckpt.pt

# sliding window inferer
batch_size: 4  #TODO Adjust this batch size based on your device.
patch_size: [128, 128, 128]
overlap: 0.5
mode: "constant"
sigma_scale: 0.125
padding_mode: "constant"

# eval & reproducibility
seed: 404

## standard pre-processing transforms #TODO I used Hu window, you can use the percentile of intensity
#transforms_config:
